name: Build Jekyll site using Docker

on:
  push:
    branches:
      - main # Change this to master if your default branch uses that name
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull your repository code into the runner container
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Run the jekyll/builder Docker image to compile the static site
      - name: Build Jekyll Site with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/srv/jekyll \
            jekyll/builder:latest \
            jekyll build

      # Step 3: Archive the compiled static files (stored in the _site directory)
      - name: Upload Build Artifacts
        uses: actions/actions-artifact@v4
        with:
          name: jekyll-static-site
          path: _site/

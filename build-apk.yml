name: Build Android APK
on:
  workflow_dispatch: # Allows you to trigger the build manually with a button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Native Wrapper Structure
        run: |
          mkdir -p android/app/src/main/java/com/vivy/callingapp
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/layout

      - name: Create AndroidManifest with WebRTC Permissions
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/work"
              package="com.vivy.callingapp">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <application
                  android:label="Vivy App"
                  android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity containing WebRTC WebChromeClient
        run: |
          cat << 'EOF' > android/app/src/main/java/com/vivy/callingapp/MainActivity.java
          package com.vivy.callingapp;

          import android.Manifest;
          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState) ;
                  WebView webView = new WebView(this);
                  setContentView(webView);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.getSettings().setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          request.grant(request.getResources());
                      }
                  });
                  
                  webView.loadUrl("https://vivi25stack.github.io/Vivy--frontend-/");
                  ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CAMERA, Manifest.permission.RECORD_AUDIO}, 1);
              }
          }
          EOF

      - name: Setup Basic Build Files
        run: |
          cat << 'EOF' > settings.gradle
          include ':app'
          project(':app').projectDir = new File('android/app')
          EOF
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google() \n mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google() \n mavenCentral() }
          }
          EOF
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.vivy.callingapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.vivy.callingapp"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vivy-Calling-App
          path: android/app/build/outputs/apk/debug/app-debug.apk

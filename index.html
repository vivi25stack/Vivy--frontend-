<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivy Live Matrix</title>
    <style>
        body {
            background-color: #0F172A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .header {
            padding: 12px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }
        .host-card {
            background: #1E293B;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .host-name { font-weight: bold; font-size: 1.1rem; }
        .host-meta { color: #94A3B8; font-size: 0.85rem; margin-top: 4px; }
        .status-online { color: #4ADE80; font-weight: bold; }
        .call-btn {
            background-color: #22C55E;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
        }
        #video-container {
            display: none;
            width: 100%;
            height: 300px;
            background: #000;
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🎙️ Vivy Host Matrix</h2>
    </div>

    <div id="host-list">
        <div class="host-card">
            <div>
                <div class="host-name">Precious (Alpha Agency)</div>
                <div class="host-meta">250 coins/30s | Status: <span class="status-online">Online</span></div>
            </div>
            <button class="call-btn" onclick="startVivyCall('2', 'Precious')">Call</button>
        </div>
    </div>

    <div id="video-container"></div>

    <!-- Your Exact Selected ZEGOCLOUD Web Stream Drivers -->
    <script src="https://resource.zegocloud.com/prebuilt/crypto-js.js"></script>
    <script src="https://resource.zegocloud.com/prebuilt/zego-express-engine-webrtc-3.0.0.js"></script>

    <script>
        // YOUR LOCKED CREDENTIALS
        const appID = 148031151; 
        const serverSecret = "a895e016159f3a88c3d94d61f37b7ff15d1de5618a236aaeb22d41e671009e36"; 
        
        // This links the engine directly to your app's cloud socket network
        const serverURL = "wss://webliveroom148031151-api.zegocloud.com/ws"; 

        async function startVivyCall(hostId, hostName) {
            const callerId = "5"; 
            const roomID = "room_" + hostId; 
            
            alert("Connecting to Vivy Backend Engine...");

            try {
                // 1. Hit your live Render backend for wallet check
                const res = await fetch("https://vivy-core-engine.onrender.com/api/calls/initiate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ callerId: callerId, hostId: hostId })
                });

                if (res.status === 200) {
                    alert("📞 Call Approved! Activating camera streaming lenses...");
                    
                    const videoContainer = document.getElementById('video-container');
                    videoContainer.style.display = "block";

                    // 2. Fire up the ZegoExpressEngine class from your script link
                    const zg = new ZegoExpressEngine(appID, serverURL);
                    
                    // Log directly into the video channel using the serverSecret validation
                    await zg.loginRoom(roomID, serverSecret, { userID: callerId, userName: "User_" + callerId }, { userUpdate: true });

                    // Tap phone hardware cameras
                    const localStream = await zg.createStream({ camera: { video: true, audio: true } });
                    
                    // Create your native visual player element
                    const localVideo = document.createElement('video');
                    localVideo.srcObject = localStream;
                    localVideo.autoplay = true;
                    localVideo.muted = true;
                    localVideo.playsInline = true; // Prevents mobile browsers from popping full screen native media players
                    localVideo.style.width = "100%";
                    localVideo.style.height = "100%";
                    localVideo.style.objectFit = "cover";
                    
                    videoContainer.appendChild(localVideo);

                    // Start broadcasting live video over the stream channel
                    zg.startPublishingStream("stream_" + callerId, localStream);

                    // 3. Keep the coin deduction billing loop running
                    runBillingHeartbeat(roomID);
                } else {
                    alert("Call Rejected: Insufficient coins in your wallet.");
                }
            } catch (err) {
                alert("Server connection timeout or camera permission denied.");
                console.error(err);
            }
        }

        function runBillingHeartbeat(sessionId) {
            setInterval(async () => {
                try {
                    const res = await fetch("https://vivy-core-engine.onrender.com/api/calls/heartbeat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ sessionId: sessionId })
                    });
                    const data = await res.json();
                    
                    if (data.action === "TERMINATE_CALL") {
                        alert("🚨 Out of coins! Call disconnected automatically.");
                        location.reload(); 
                    }
                } catch (e) { console.log("Heartbeat balance tracking active."); }
            }, 30000); 
        }
    </script>
</body>
    </html>
